<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- 4섹션 경계를 부드럽게 블렌딩 -->
    <filter id="smooth" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- 원형 클립으로 잘라내기 -->
    <clipPath id="circleClip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
    <!-- 내부 그림자 효과 -->
    <radialGradient id="innerShadow" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>

  <!-- 블러 처리된 4색 섹터 (원형 클립으로 잘라냄) -->
  <g clip-path="url(#circleClip)" filter="url(#smooth)">
    <g transform="translate(32 32)">
      <!-- 상단 우측: 불 -->
      <path d="M 0 -40 A 40 40 0 0 1 40 0 L 0 0 Z" fill="#D94B18"/>
      <!-- 하단 우측: 바람 -->
      <path d="M 40 0 A 40 40 0 0 1 0 40 L 0 0 Z" fill="#D18636"/>
      <!-- 하단 좌측: 땅 -->
      <path d="M 0 40 A 40 40 0 0 1 -40 0 L 0 0 Z" fill="#A98654"/>
      <!-- 상단 좌측: 물 -->
      <path d="M -40 0 A 40 40 0 0 1 0 -40 L 0 0 Z" fill="#1E7FA8"/>
    </g>
  </g>
  <!-- 내부 그림자 -->
  <circle cx="32" cy="32" r="30" fill="url(#innerShadow)"/>
  <!-- 외곽 하이라이트 링 -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
</svg>
