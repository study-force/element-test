<!-- 리포트 미리보기 모달 -->
<div id="rptModal" style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.92);justify-content:center;align-items:flex-start;overflow-y:auto;">
  <div style="max-width:800px;width:100%;padding:20px 16px 60px;">
    <div style="position:sticky;top:0;z-index:10;background:rgba(0,0,0,0.85);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-radius:8px;margin-bottom:12px;">
      <span style="font-size:14px;font-weight:700;color:#fff;font-family:'Noto Sans KR',sans-serif;">리포트 샘플 — 학생 유형을 선택하세요</span>
      <button onclick="document.getElementById('rptModal').style.display='none';" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:13px;padding:6px 16px;border-radius:6px;cursor:pointer;">닫기 ✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">
      <button onclick="showRpt('top','김OO · 초6 — 최상위권')" style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#1E293B;border:1px solid #334155;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">
        <span>김OO · 초6</span><span style="font-size:11px;background:rgba(52,211,153,0.2);color:#34D399;padding:3px 10px;border-radius:12px;">최상위권</span>
      </button>
      <button onclick="showRpt('mid','김OO · 초4 — 중위권')" style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#1E293B;border:1px solid #334155;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">
        <span>김OO · 초4</span><span style="font-size:11px;background:rgba(251,191,36,0.2);color:#FBBF24;padding:3px 10px;border-radius:12px;">중위권</span>
      </button>
      <button onclick="showRpt('low','박OO · 초5 — 집중관리')" style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#1E293B;border:1px solid #334155;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">
        <span>박OO · 초5</span><span style="font-size:11px;background:rgba(239,68,68,0.2);color:#EF4444;padding:3px 10px;border-radius:12px;">집중관리</span>
      </button>
    </div>
    <div id="rptImages" style="display:flex;flex-direction:column;gap:4px;"></div>
  </div>
</div>
<script>
function showRpt(type,title){
  var c=document.getElementById('rptImages');c.innerHTML='';
  for(var i=1;i<=5;i++){
    var img=document.createElement('img');
    img.src='https://element-test-mauve.vercel.app/report-sample-'+type+'-'+i+'.jpg';
    img.style.cssText='width:100%;display:block;border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.3)';
    c.appendChild(img);
  }
}
</script>
