<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>
  <!-- 4개의 원호 세그먼트로 conic-gradient 재현 -->
  <g transform="translate(32 32)">
    <!-- 상단: 불 (D94B18) -->
    <path d="M 0 -30 A 30 30 0 0 1 30 0 L 0 0 Z" fill="#D94B18"/>
    <!-- 우측: 바람 (D18636) -->
    <path d="M 30 0 A 30 30 0 0 1 0 30 L 0 0 Z" fill="#D18636"/>
    <!-- 하단: 땅 (A98654) -->
    <path d="M 0 30 A 30 30 0 0 1 -30 0 L 0 0 Z" fill="#A98654"/>
    <!-- 좌측: 물 (1E7FA8) -->
    <path d="M -30 0 A 30 30 0 0 1 0 -30 L 0 0 Z" fill="#1E7FA8"/>
  </g>
  <!-- 내부 그림자 효과 -->
  <circle cx="32" cy="32" r="30" fill="url(#shadow)"/>
  <!-- 외곽선 -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
</svg>
